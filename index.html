
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicTris - El Mundo de Gumi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-light: #a5f3fc;
            --sky-mid: #7dd3fc;
            --sky-dark: #3b82f6;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, var(--sky-light) 0%, var(--sky-mid) 50%, var(--sky-dark) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
            min-height: 100vh;
            color: #1e3a8a;
        }
        h1, h2, h3, .font-magic { font-family: 'Fredoka One', cursive; }
        
        .magic-title {
            font-family: 'Fredoka One', cursive;
            color: #1e40af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            -webkit-text-stroke: 1.5px white;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .cloud-emoji {
            position: absolute;
            opacity: 0.8; /* Nubes más visibles y mágicas */
            animation: float-cloud linear infinite;
        }

        @keyframes float-cloud {
            from { transform: translateX(-20vw); }
            to { transform: translateX(110vw); }
        }

        .btn-magic-pop {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #1e40af;
        }
        .btn-magic-pop:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e40af;
        }

        .card-magic {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .floating-gumi { animation: float-gumi 3s ease-in-out infinite; }
        @keyframes float-gumi {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #root { min-height: 100vh; position: relative; z-index: 10; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--sky-light); }
        ::-webkit-scrollbar-thumb { background: var(--sky-dark); border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.45.0"
  }
}
</script>
</head>
<body>
    <div class="cloud-container">
        <div class="cloud-emoji text-[120px] top-10" style="animation-duration: 45s; left: -10%;">☁️</div>
        <div class="cloud-emoji text-[180px] top-60" style="animation-duration: 70s; left: -25%;">☁️</div>
        <div class="cloud-emoji text-[140px] top-20 right-0" style="animation-duration: 55s; left: 80%;">☁️</div>
        <div class="cloud-emoji text-[100px] bottom-20" style="animation-duration: 50s; left: -15%;">☁️</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
